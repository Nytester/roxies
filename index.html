function useIsMobile(breakpoint = 768) {
  const [mobile, setMobile] = React.useState(() => window.innerWidth < breakpoint);
  React.useEffect(() => {
    const fn = () => setMobile(window.innerWidth < breakpoint);
    window.addEventListener('resize', fn);
    return () => window.removeEventListener('resize', fn);
  }, [breakpoint]);
  return mobile;
}

// ============================================================
// LUCIDE ICON HELPER
// ============================================================
function Ic({ name, size = 18, color }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    if (ref.current && window.lucide) {
      window.lucide.createIcons({ nodes: [ref.current] });
    }
  });
  return (
    <i
      ref={ref}
      data-lucide={name}
      style={{ width: size, height: size, display: 'inline-flex', flexShrink: 0, color }}
    />
  );
}

function Wordmark({ size = 'md', onDark = false, layout = 'stacked', style = {} }) {
  const scales = {
    sm: { script: '1.6rem', caps: '0.5rem' },
    md: { script: '2.6rem', caps: '0.7rem' },
    lg: { script: '4rem', caps: '0.95rem' },
  };
  const s = scales[size] || scales.md;
  const scriptColor = 'var(--gold-400)';
  const capsColor = onDark ? 'var(--buttermilk-50)' : 'var(--smoke-900)';

  if (layout === 'inline') {
    return (
      <span style={{ display: 'inline-flex', alignItems: 'baseline', gap: '0.5rem', ...style }}>
        <span style={{ fontFamily: 'var(--font-script)', fontSize: s.script, lineHeight: 1, color: scriptColor }}>Roxie's</span>
        <span style={{ fontFamily: 'var(--font-display)', fontWeight: 700, fontSize: s.caps, letterSpacing: 'var(--ls-wider)', textTransform: 'uppercase', color: capsColor }}>Southern Bistro</span>
      </span>
    );
  }

  return (
    <span style={{ display: 'inline-flex', flexDirection: 'column', alignItems: 'center', lineHeight: 1, ...style }}>
      <span style={{ fontFamily: 'var(--font-script)', fontSize: s.script, lineHeight: 1, color: scriptColor, marginBottom: '0.1em' }}>Roxie's</span>
      <span style={{
        fontFamily: 'var(--font-display)', fontWeight: 700, fontSize: s.caps,
        letterSpacing: 'var(--ls-widest)', textTransform: 'uppercase', color: capsColor,
        display: 'flex', alignItems: 'center', gap: '0.6em',
      }}>
        <span style={{ width: '1.4em', height: 1, background: 'currentColor', opacity: 0.5 }} />
        Southern Bistro
        <span style={{ width: '1.4em', height: 1, background: 'currentColor', opacity: 0.5 }} />
      </span>
    </span>
  );
}

  );
}

    cayenne: { fg: 'var(--cayenne-500)', bg: 'rgba(190,58,30,0.12)',   border: 'var(--cayenne-400)', solidBg: 'var(--cayenne-500)', solidFg: 'var(--buttermilk-50)' },
    collard: { fg: 'var(--collard-500)', bg: 'rgba(52,71,47,0.12)',    border: 'var(--collard-400)', solidBg: 'var(--collard-500)', solidFg: 'var(--buttermilk-50)' },
    neutral: { fg: 'var(--text-muted)',  bg: 'rgba(20,16,12,0.06)',    border: 'var(--line-strong)', solidBg: 'var(--smoke-700)',   solidFg: 'var(--buttermilk-50)' },
  };
  const t = tones[tone] || tones.gold;
  const pad = size === 'sm' ? '0.2rem 0.5rem' : '0.3rem 0.7rem';
  const fz = size === 'sm' ? '0.65rem' : 'var(--fs-xs)';

      fontFamily: 'var(--font-sans)', fontWeight: 700, fontSize: fz,
      letterSpacing: 'var(--ls-wider)', textTransform: 'uppercase', lineHeight: 1,
      padding: pad, borderRadius: 'var(--radius-sm)',
      color: solid ? t.solidFg : t.fg,
      background: solid ? t.solidBg : t.bg,
      border: `1px solid ${solid ? 'transparent' : t.border}`,
      ...style,
    }}>
      {children}

function Button({ children, variant = 'primary', size = 'md', full = false, disabled = false, iconLeft = null, iconRight = null, style = {}, ...rest }) {
  const sizes = {
    sm: { padding: '0.5rem 0.9rem', fontSize: 'var(--fs-sm)', gap: '0.4rem' },
    md: { padding: '0.75rem 1.4rem', fontSize: 'var(--fs-base)', gap: '0.5rem' },
    lg: { padding: '1rem 2rem', fontSize: 'var(--fs-md)', gap: '0.6rem' },
  };
  const variants = {
    primary: { background: 'var(--gold-500)', color: 'var(--smoke-900)', border: '1px solid var(--gold-600)', boxShadow: 'var(--shadow-gold)' },
    accent:  { background: 'var(--oxblood-500)', color: 'var(--buttermilk-50)', border: '1px solid var(--oxblood-600)', boxShadow: 'var(--shadow-sm)' },
    dark:    { background: 'var(--smoke-900)', color: 'var(--buttermilk-50)', border: '1px solid var(--smoke-700)', boxShadow: 'var(--shadow-sm)' },
    outline: { background: 'transparent', color: 'var(--smoke-900)', border: '2px solid var(--smoke-900)', boxShadow: 'none' },
    ghost:   { background: 'transparent', color: 'var(--oxblood-500)', border: '2px solid transparent', boxShadow: 'none' },
  };
  const sz = sizes[size] || sizes.md;
  const vr = variants[variant] || variants.primary;
  return (
    <button
      disabled={disabled}
      style={{
        display: full ? 'flex' : 'inline-flex',
        width: full ? '100%' : 'auto',
        alignItems: 'center', justifyContent: 'center',
        gap: sz.gap, fontFamily: 'var(--font-sans)', fontWeight: 700,
        fontSize: sz.fontSize, letterSpacing: 'var(--ls-wide)', textTransform: 'uppercase',
        padding: sz.padding, borderRadius: 'var(--radius-sm)',
        cursor: disabled ? 'not-allowed' : 'pointer',
        opacity: disabled ? 0.45 : 1,
        transition: 'transform var(--dur-fast) var(--ease-out), filter var(--dur-fast) var(--ease-out)',
        ...vr, ...style,
      }}
      onMouseDown={(e) => !disabled && (e.currentTarget.style.transform = 'translateY(1px) scale(0.99)')}
      onMouseUp={(e) => (e.currentTarget.style.transform = 'none')}
      onMouseLeave={(e) => (e.currentTarget.style.transform = 'none')}
      {...rest}
    >
      {iconLeft}
      {children}
      {iconRight}
    </button>
  );
}

function IconButton({ children, variant = 'solid', size = 'md', round = true, disabled = false, ariaLabel, style = {}, ...rest }) {
  const dims = { sm: 32, md: 40, lg: 48 };
  const d = dims[size] || 40;
  const variants = {
    solid:   { background: 'var(--gold-500)', color: 'var(--smoke-900)', border: '1px solid var(--gold-600)' },
    dark:    { background: 'var(--smoke-900)', color: 'var(--buttermilk-50)', border: '1px solid var(--smoke-700)' },
    outline: { background: 'transparent', color: 'var(--smoke-900)', border: '1.5px solid var(--line-strong)' },
    ghost:   { background: 'transparent', color: 'var(--text-body)', border: '1px solid transparent' },
  };
  return (
    <button
      aria-label={ariaLabel}
      disabled={disabled}
      style={{
        display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
        width: d, height: d,
        borderRadius: round ? 'var(--radius-circle)' : 'var(--radius-sm)',
        cursor: disabled ? 'not-allowed' : 'pointer',
        opacity: disabled ? 0.45 : 1,
        transition: 'transform var(--dur-fast) var(--ease-out), background var(--dur-fast) var(--ease-out)',
        ...(variants[variant] || variants.solid), ...style,
      }}
      onMouseDown={(e) => !disabled && (e.currentTarget.style.transform = 'scale(0.92)')}
      onMouseUp={(e) => (e.currentTarget.style.transform = 'none')}
      onMouseLeave={(e) => (e.currentTarget.style.transform = 'none')}
      {...rest}
    >
      {children}
    </button>
  );
}

    <span style={{

      fontSize: sizes[size] || sizes.md, lineHeight: 1,
      color: muted ? 'var(--text-muted)' : 'var(--oxblood-500)',

      whiteSpace: 'nowrap', fontFeatureSettings: '"tnum" 1',
      ...style,
    }}>

      {amount}

    </span>
  );
}

function Input({ label, icon = null, type = 'text', invalid = false, hint, style = {}, id, ...rest }) {
  const inputId = id || (label ? label.toLowerCase().replace(/\s+/g, '-') : undefined);
  const [focused, setFocused] = React.useState(false);
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: '0.4rem', width: '100%' }}>
      {label && (
        <label htmlFor={inputId} style={{
          fontFamily: 'var(--font-sans)', fontSize: 'var(--fs-xs)', fontWeight: 700,
          letterSpacing: 'var(--ls-wider)', textTransform: 'uppercase', color: 'var(--text-muted)',
        }}>
          {label}
        </label>
      )}
      <div style={{
        display: 'flex', alignItems: 'center', gap: '0.6rem',
        padding: '0.7rem 0.9rem', background: 'var(--surface-card)',
        border: `1.5px solid ${invalid ? 'var(--cayenne-500)' : focused ? 'var(--gold-500)' : 'var(--line-strong)'}`,
        borderRadius: 'var(--radius-sm)',
        boxShadow: focused ? 'var(--ring)' : 'none',
        transition: 'border var(--dur-fast) var(--ease-out), box-shadow var(--dur-fast) var(--ease-out)',
        ...style,
      }}>
        {icon && <span style={{ display: 'inline-flex', color: 'var(--text-muted)', flexShrink: 0 }}>{icon}</span>}
        <input
          id={inputId} type={type}
          onFocus={() => setFocused(true)}
          onBlur={() => setFocused(false)}
          style={{ flex: 1, border: 'none', outline: 'none', background: 'transparent', fontFamily: 'var(--font-sans)', fontSize: 'var(--fs-base)', color: 'var(--text-strong)' }}
          {...rest}
        />
      </div>
      {hint && <span style={{ fontFamily: 'var(--font-sans)', fontSize: 'var(--fs-xs)', color: invalid ? 'var(--cayenne-500)' : 'var(--text-muted)' }}>{hint}</span>}
    </div>
  );
}

function QuantityStepper({ value = 1, min = 1, max = 99, onChange = () => {}, size = 'md', style = {} }) {
  const dec = () => onChange(Math.max(min, value - 1));
  const inc = () => onChange(Math.min(max, value + 1));
  const d = size === 'sm' ? 30 : 38;
  const btn = (disabled) => ({
    width: d, height: d, display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
    border: 'none', background: 'transparent', cursor: disabled ? 'not-allowed' : 'pointer',
    color: disabled ? 'var(--text-faint)' : 'var(--smoke-900)', fontSize: '1.2rem', fontWeight: 700,
    transition: 'background var(--dur-fast) var(--ease-out)',
  });
  return (
    <div style={{
      display: 'inline-flex', alignItems: 'center',
      border: '1.5px solid var(--line-strong)', borderRadius: 'var(--radius-pill)',
      background: 'var(--surface-card)', ...style,
    }}>
      <button aria-label="Decrease" style={btn(value <= min)} onClick={dec} disabled={value <= min}>&minus;</button>
      <span style={{
        minWidth: d, textAlign: 'center',
        fontFamily: 'var(--font-display)', fontWeight: 700,
        fontSize: 'var(--fs-md)', color: 'var(--text-strong)',
        fontFeatureSettings: '"tnum" 1',
      }}>{value}</span>
      <button aria-label="Increase" style={btn(value >= max)} onClick={inc} disabled={value >= max}>+</button>
    </div>
  );
}

// ============================================================
// APP ROOT
// ============================================================
function App() {
  const [screen, setScreen] = React.useState('home');
  const [cart, setCart] = React.useState({});

  const addToCart = (item, delta = 1) => {
    setCart((c) => {
      const next = { ...c };
      const cur = next[item.name] || { name: item.name, price: item.price, qty: 0 };
      const qty = cur.qty + delta;
      if (qty <= 0) { delete next[item.name]; }
      else { next[item.name] = { ...cur, qty }; }
      return next;
    });
  };

  const cartCount = Object.values(cart).reduce((s, c) => s + c.qty, 0);
  const nav = (s) => { setScreen(s); window.scrollTo({ top: 0, behavior: 'smooth' }); };

  return (
    <div>
      <Header active={screen} onNav={nav} cartCount={cartCount} />
      {screen === 'home'    && <Home onNav={nav} onAdd={addToCart} />}
      {screen === 'menu'    && <MenuPage cart={cart} onAdd={addToCart} />}
      {screen === 'reserve' && <Reservations />}
      {screen === 'story'   && <OurStory onNav={nav} />}
      <Footer />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
